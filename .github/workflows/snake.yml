name: Générer le serpent des contributions

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Générer les SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: MattRvfl
          outputs: |
            dist/snake.svg?color_snake=#0A84FF&color_dots=#15151E,#0d2f55,#0a4c8f,#0a6cd4,#0A84FF

      - name: Publier sur la branche output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
